services:
  circle-api:
    image: circle-api
    container_name: circle-api
    ports:
      - "3000:3000"
    networks:
      - circle-network
    env_file:
      - ./server/.env.production
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      circle-db:
        condition: service_healthy

  circle-db:
    image: postgres:14
    container_name: circle-db
    ports:
      - "5432:5432"
    volumes:
      - circle-data:/var/lib/postgres/data
    networks:
      - circle-network
    environment:
      - POSTGRES_DB=circle
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin123
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d circle" ]
      interval: 5s
      timeout: 2s
      retries: 20

volumes:
  circle-data:

networks:
  circle-network:
    driver: bridge